# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — runs on every push and pull request
#
# Steps:
#   1. Lint code with ruff
#   2. Run unit tests with pytest
#   3. Run full ML pipeline (train model)
#   4. Build Docker image
#
# Free tier: GitHub Actions gives 2,000 minutes/month for free accounts.
# ─────────────────────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      # 4. Lint — fail on syntax errors or undefined names
      - name: Lint with ruff
        run: ruff check src/ tests/ --select E,F --ignore E501

      # 5. Unit tests
      - name: Run tests
        run: pytest tests/ -v --tb=short

  train-pipeline:
    name: Train & Validate Model
    runs-on: ubuntu-latest
    needs: lint-and-test          # only run if tests pass

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run full ML pipeline
      - name: Run training pipeline
        run: python src/pipeline.py

      # Check that model file was created
      - name: Verify model artifact exists
        run: |
          test -f models/best_model.pkl && echo "Model saved successfully" || exit 1
          cat models/metrics.json

      # Upload trained model as artifact (downloadable from Actions UI)
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/best_model.pkl
            models/metrics.json
          retention-days: 30

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train-pipeline        # only build if model training succeeded

    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Build Docker image
        run: docker build -t churn-api:latest .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name churn-test churn-api:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop churn-test
          echo "Container smoke test passed"

      # Optional: push to Docker Hub (add DOCKERHUB_TOKEN secret to repo)
      # - name: Push to Docker Hub
      #   run: |
      #     echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      #     docker tag churn-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest
      #     docker push ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest
